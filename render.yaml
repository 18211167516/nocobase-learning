# Render Blueprint - NocoBase Learning Platform
# Deploy this file from Render Dashboard: New -> Blueprint -> Select this repo

services:
  # Backend API Service
  - type: web
    name: nocobase-backend
    env: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /

  # Frontend Static Site  
  - type: web
    name: nocobase-frontend
    env: static
    region: singapore
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate